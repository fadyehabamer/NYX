name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & verify dist is in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # No dependencies — Nyx is zero-dep. Just run the build.
      - name: Build
        run: node build.js

      # The committed dist (components/, nyx.min.*, synced nyx.js) must match
      # a fresh build. If this fails, someone edited nyx.css/nyx.js or bumped
      # the version without running `node build.js` — rebuild and commit.
      - name: Verify dist is committed & in sync
        run: |
          if ! git diff --quiet; then
            echo "::error::Dist is out of sync. Run 'node build.js' and commit the result."
            git --no-pager diff --stat
            exit 1
          fi

      - name: Sanity-check key artifacts exist
        run: |
          for f in nyx.css nyx.min.css nyx.js nyx.min.js \
                   components/tokens.css components/backgrounds.css \
                   components/charts.css components/code.css; do
            test -s "$f" || { echo "::error::missing or empty: $f"; exit 1; }
          done
