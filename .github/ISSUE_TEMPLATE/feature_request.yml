name: 💡 Feature request
description: Suggest a new component, utility, or improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Nyx add or change? A class name, markup, or API sketch helps.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing components or workarounds you tried.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This should respect theming via --nyx-* tokens
        - label: This should work in both LTR and RTL
