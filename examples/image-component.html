<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Image Component — NYX Example</title>
  <link rel="stylesheet" href="../nyx.css">
  <style>body{font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial; padding:1rem}</style>
</head>
<body>
  <h1>مكون الصورة المتجاوبة</h1>

  <figure style="max-width:640px">
    <div class="nyx-image nyx-image--ratio-16-9" data-loaded="false" id="imgWrap">
      <div class="nyx-image__placeholder" aria-hidden="true"></div>
      <img alt="منظر طبيعي" src="https://picsum.photos/800/450" srcset="https://picsum.photos/400/225 400w, https://picsum.photos/800/450 800w, https://picsum.photos/1200/675 1200w" sizes="(max-width:640px) 100vw, 640px" loading="lazy" decoding="async" id="demoImg">
    </div>
    <figcaption>مثال على srcset + lazy loading</figcaption>
  </figure>

  <script src="../nyx.js"></script>
</body>
</html>
